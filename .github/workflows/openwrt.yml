name: OpenWrt

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

concurrency:
  group: openwrt-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build:
    name: Build OpenWrt bundle (mipsel-musl)
    runs-on: ubuntu-24.04
    permissions:
      contents: write
    env:
      TARGET: mipsel-unknown-linux-musl
      PKG_ARCH: mipsel_24kc
      ZIG_VER: 0.13.0

    steps:
      - uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: lts/*
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml

      - name: Install nightly Rust (with rust-src)
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: nightly
          components: rust-src

      - name: Install Zig
        run: |
          curl -L "https://ziglang.org/download/${ZIG_VER}/zig-linux-x86_64-${ZIG_VER}.tar.xz" | sudo tar -xJ -C /usr/local
          echo "/usr/local/zig-linux-x86_64-${ZIG_VER}" >> "$GITHUB_PATH"

      - name: Create CC wrapper + linker wrapper (zig only)
        run: |
          echo '#!/bin/sh' > /tmp/mipsel-cc
          echo 'ARGS=""' >> /tmp/mipsel-cc
          echo 'for arg in "$@"; do' >> /tmp/mipsel-cc
          echo '  case "$arg" in' >> /tmp/mipsel-cc
          echo '    --target=*) ;;' >> /tmp/mipsel-cc
          echo '    *) ARGS="$ARGS $arg" ;;' >> /tmp/mipsel-cc
          echo '  esac' >> /tmp/mipsel-cc
          echo 'done' >> /tmp/mipsel-cc
          echo 'exec zig cc -target mipsel-linux-musl -msoft-float $ARGS' >> /tmp/mipsel-cc
          chmod +x /tmp/mipsel-cc
          echo '#!/bin/sh' > /tmp/mipsel-linker
          echo 'ARGS=""' >> /tmp/mipsel-linker
          echo 'for arg in "$@"; do' >> /tmp/mipsel-linker
          echo '  case "$arg" in' >> /tmp/mipsel-linker
          echo '    crt1.o|crti.o|crtn.o|crtbegin.o|crtend.o|crtbeginS.o|crtendS.o) ;;' >> /tmp/mipsel-linker
          echo '    *) ARGS="$ARGS $arg" ;;' >> /tmp/mipsel-linker
          echo '  esac' >> /tmp/mipsel-linker
          echo 'done' >> /tmp/mipsel-linker
          echo 'exec zig cc -target mipsel-linux-musl -msoft-float -static $ARGS' >> /tmp/mipsel-linker
          chmod +x /tmp/mipsel-linker

      - name: Install frontend dependencies
        run: pnpm install --frozen-lockfile

      - name: Build WebUI
        run: pnpm build

      - name: Cross-compile server binary
        run: |
          set -euo pipefail
          # The WebUI was built into ./dist on the host. `cross` builds inside a
          # container that only mounts ./src-tauri, so expose ../dist to it via
          # the MIX_DIST_DIR volume declared in src-tauri/Cross.toml.
          export MIX_DIST_DIR="$GITHUB_WORKSPACE/dist"
          test -f "$MIX_DIST_DIR/index.html" || { echo "!! dist/ not built" >&2; exit 1; }
          cd src-tauri
          export CC_mipsel_unknown_linux_musl=/tmp/mipsel-cc
          export CARGO_TARGET_MIPSEL_UNKNOWN_LINUX_MUSL_LINKER=/tmp/mipsel-linker
          export CARGO_TARGET_MIPSEL_UNKNOWN_LINUX_MUSL_RUSTFLAGS="-C target-feature=+soft-float -C target-feature=+crt-static"
          cargo +nightly build -Z build-std --release --no-default-features --target "$TARGET" --bin mix_api_bridge

      - name: Stage + strip binary
        id: bin
        run: |
          set -euo pipefail
          mkdir -p openwrt/out
          BIN="src-tauri/target/$TARGET/release/mix_api_bridge"
          cp -f "$BIN" openwrt/out/mix_api_bridge
          zig objcopy --strip-all openwrt/out/mix_api_bridge || true
          file openwrt/out/mix_api_bridge || true

      - name: Pack deployable bundle
        run: |
          set -euo pipefail
          NAME="mix_api_bridge_${GITHUB_REF_NAME}_openwrt_mipsel.tar.gz"
          echo "BUNDLE=$NAME" >> "$GITHUB_ENV"
          bash openwrt/pack-bundle.sh openwrt/out/mix_api_bridge "openwrt/out/$NAME"

      - name: Build opkg ipk
        run: |
          set -euo pipefail
          ver="${GITHUB_REF_NAME#v}"
          [ "$ver" = "$GITHUB_REF_NAME" ] && ver="0.0.0-dev"
          IPK="luci-app-mix_${ver}-1_${PKG_ARCH}.ipk"
          echo "IPK=$IPK" >> "$GITHUB_ENV"
          PKG_VERSION="$ver" PKG_ARCH="$PKG_ARCH" \
            bash openwrt/build-ipk.sh openwrt/out/mix_api_bridge "openwrt/out/$IPK"

      - name: Upload workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: openwrt-mipsel
          path: |
            openwrt/out/${{ env.BUNDLE }}
            openwrt/out/${{ env.IPK }}
          if-no-files-found: error

      - name: Compute date version
        id: ver
        run: echo "date=$(TZ=Asia/Shanghai date +'%y%m%d')" >> "$GITHUB_OUTPUT"

      - name: Attach to draft release
        if: github.ref_type == 'tag'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: "mix_api_bridge ${{ github.ref_name }} (${{ steps.ver.outputs.date }})"
          body: "Draft release generated by GitHub Actions."
          draft: true
          prerelease: false
          files: |
            openwrt/out/${{ env.BUNDLE }}
            openwrt/out/${{ env.IPK }}
