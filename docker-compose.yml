services:
  mix_api_bridge:
    build: .
    image: mix_api_bridge:latest
    container_name: mix_api_bridge
    restart: unless-stopped
    ports:
      - "8765:8765"
    volumes:
      - ./data:/data
    environment:
      MICLAW_API_BRIDGE_DISABLE_KEYRING: "1"
      RUST_LOG: "mix_api_bridge_lib=info"

